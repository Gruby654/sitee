<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Learning Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        nav {
            background: #34495e;
            padding: 10px;
        }
        
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        
        nav a:hover {
            color: #3498db;
        }
        
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .course {
            background: #ecf0f1;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #3498db;
        }
    </style>
</head>
<body>
    <header>
        <h1>Learn Web Development</h1>
        <p>Master HTML, CSS, and JavaScript</p>
    </header>
    
    <nav>
        <a href="#html">HTML</a>
        <a href="#css">CSS</a>
        <a href="#javascript">JavaScript</a>
    </nav>
    
    <div class="container">
        <section id="html">
            <h2>HTML Basics</h2>
            <div class="course">
                <h3>Getting Started</h3>
                <p>Learn the fundamental structure of web pages.</p>
            </div>
        </section>
        
        <section id="css">
            <h2>CSS Styling</h2>
            <div class="course">
                <h3>Selectors & Properties</h3>
                <p>Style your HTML with CSS.</p>
            </div>
        </section>
        
        <section id="javascript">
            <h2>JavaScript Programming</h2>
            <div class="course">
                <h3>Variables & Functions</h3>
                <p>Make your pages interactive.</p>
            </div>
        </section>
    </div>
</body>
</html>
